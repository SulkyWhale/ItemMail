name: ItemMail
version: ${project.version}
main: io.github.sulkywhale.itemmail.ItemMail
api-version: '1.21'
authors: [ Sulky_Whale ]
folia-supported: true
softdepend: [ Vault ]

libraries:
  - com.zaxxer:HikariCP:7.0.2

commands:
  itemmail:
    aliases: [ mailitem ]
    description: Mail items to other players

permissions:
  itemmail.mail:
    description: Allows players to send and receive mail as well as view the mail GUI
    default: op
    children:
      itemmail.mail.send: true
      itemmail.mail.gui: true
  itemmail.mail.send:
    description: Allows players to send mail
    default: op
  itemmail.mail.gui:
    description: Allows players to view mail GUI and receive mail
    default: op
  itemmail.mail.blacklist.bypass:
    description: Allows players to bypass the mail blacklist
    default: op
  itemmail.admin:
    description: Allows admins to view contents of and modify players' mail
    default: op
    children:
      itemmail.admin.view: true
      itemmail.admin.reload: true
  itemmail.admin.view:
    description: Allows admins to view contents of players' mail
    default: op
  itemmail.admin.reload:
    description: Allows admins to reload the plugin
    default: op
